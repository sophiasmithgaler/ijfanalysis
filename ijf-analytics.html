<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IJF Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f4;
    --surface: #f0ede6;
    --border: #ddd9d0;
    --ink: #1a1814;
    --muted: #8a8478;
    --accent: #c8411f;
    --accent2: #2d5a8e;
    --accent3: #5a8c3c;
    --card: #ffffff;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
  }

  #ijf-app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  .ijf-header {
    border-bottom: 2px solid var(--ink);
    margin-bottom: 40px;
    padding-bottom: 24px;
  }

  .ijf-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--ink);
  }

  .ijf-header h1 em {
    color: var(--accent);
    font-style: normal;
  }

  .ijf-header p {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 8px;
  }

  .ijf-stats-row {
    display: flex;
    gap: 40px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .ijf-stat {
    display: flex;
    flex-direction: column;
  }

  .ijf-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .ijf-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 2px;
  }

  /* TABS */
  .ijf-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .ijf-tab {
    padding: 10px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }

  .ijf-tab:hover { color: var(--ink); }
  .ijf-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* CARDS */
  .ijf-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 20px;
  }

  .ijf-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ijf-card-title span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* GRID */
  .ijf-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .ijf-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 700px) {
    .ijf-grid-2, .ijf-grid-3 { grid-template-columns: 1fr; }
  }

  /* CHART BARS */
  .ijf-bar-chart { display: flex; flex-direction: column; gap: 10px; }

  .ijf-bar-row {
    display: grid;
    grid-template-columns: 90px 1fr 50px;
    align-items: center;
    gap: 12px;
  }

  .ijf-bar-label {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .ijf-bar-track {
    background: var(--surface);
    height: 20px;
    position: relative;
    overflow: hidden;
  }

  .ijf-bar-fill {
    height: 100%;
    transition: width 0.6s ease;
  }

  .ijf-bar-value {
    font-size: 11px;
    color: var(--muted);
  }

  /* YEAR PILLS */
  .ijf-year-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .ijf-year-pill {
    padding: 4px 14px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .ijf-year-pill:hover { border-color: var(--ink); color: var(--ink); }
  .ijf-year-pill.active { background: var(--ink); color: white; border-color: var(--ink); }

  /* TABLE */
  .ijf-scroll { overflow-x: auto; }

  table.ijf-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .ijf-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    background: var(--surface);
  }

  .ijf-table th:hover { color: var(--ink); }

  .ijf-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .ijf-table tr:hover td { background: var(--surface); }

  /* TAGS */
  .ijf-tag {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid var(--border);
    font-size: 10px;
    margin: 2px;
    color: var(--muted);
    background: var(--surface);
  }

  .ijf-badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 10px;
    background: var(--accent);
    color: white;
    font-weight: 500;
  }

  .ijf-badge-blue {
    background: var(--accent2);
  }

  /* SEARCH */
  .ijf-search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .ijf-input {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    background: var(--card);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }

  .ijf-input:focus { border-color: var(--accent); }
  .ijf-input::placeholder { color: var(--muted); }

  select.ijf-input {
    cursor: pointer;
    max-width: 200px;
  }

  /* THEME CLOUD */
  .ijf-theme-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .ijf-theme-pill {
    padding: 5px 14px;
    border: 1px solid var(--border);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--card);
  }

  .ijf-theme-pill:hover { background: var(--surface); border-color: var(--ink); }
  .ijf-theme-pill.hot { background: var(--accent); color: white; border-color: var(--accent); }
  .ijf-theme-pill.warm { background: #f0e0da; border-color: #d4917e; }
  .ijf-theme-pill.cool { background: var(--surface); }

  /* SVG CHART */
  .ijf-svg-chart {
    width: 100%;
    overflow: visible;
  }

  /* EMPTY */
  .ijf-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 12px;
  }

  /* RETURNING INDICATOR */
  .returning-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    margin-right: 6px;
    flex-shrink: 0;
  }

  .ijf-highlight {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
  }
</style>
</head>

const YEARS = ["2012","2013","2014","2015","2016","2017","2018","2019","2020","2022","2023","2024","2025","2026"];

// ─── COMPUTED STATS ────────────────────────────────────────────────────────

function computeAll() {
  const allSpeakers = {};
  YEARS.forEach(yr => {
    (IJF_DATA.speakers[yr]||[]).forEach(s => {
      if (!allSpeakers[s.name]) allSpeakers[s.name] = {name:s.name, years:[], orgs:new Set(), roles:new Set()};
      if (!allSpeakers[s.name].years.includes(yr)) allSpeakers[s.name].years.push(yr);
      if (s.org) allSpeakers[s.name].orgs.add(s.org);
      if (s.role) allSpeakers[s.name].roles.add(s.role);
    });
  });
  Object.values(allSpeakers).forEach(s => {
    s.orgs = [...s.orgs];
    s.roles = [...s.roles];
    s.years.sort();
    s.count = s.years.length;
  });
  return allSpeakers;
}

const ALL_SPEAKERS = computeAll();

function speakersByYear() {
  return YEARS.map(yr => ({year:yr, count: new Set((IJF_DATA.speakers[yr]||[]).map(s=>s.name)).size}));
}

function sessionsByYear() {
  return YEARS.map(yr => ({year:yr, count: (IJF_DATA.sessions[yr]||[]).length}));
}

function topOrgs(filterYear) {
  const m = {};
  YEARS.forEach(yr => {
    if (filterYear !== 'all' && yr !== filterYear) return;
    (IJF_DATA.speakers[yr]||[]).forEach(s => {
      if (s.org) m[s.org] = (m[s.org]||0)+1;
    });
  });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([name,count])=>({name,count}));
}

function getThemes() {
  const m = {};
  YEARS.forEach(yr => {
    const spk = IJF_DATA.speakers[yr]||[];
    const sess = IJF_DATA.sessions[yr]||[];
    // extract themes from session titles
    const aiKeywords = ['ai','artificial intelligence','machine learning','algorithm','chatgpt','generative'];
    const climateKeywords = ['climate','environment','green','fossil','carbon','cop'];
    const localKeywords = ['local news','local journalism','community'];
    const warKeywords = ['war','ukraine','gaza','conflict','syria'];
    const disinfoKeywords = ['disinformation','misinformation','fake news','fact-check'];
    const fundingKeywords = ['funding','philanthropy','fund','revenue','business model'];
    const safetyKeywords = ['safety','mental health','well-being','threat'];
    const diversityKeywords = ['diversity','gender','race','inclusion','feminist','women'];
    const pressKeywords = ['press freedom','censorship','exile','imprisoned'];

    const cats = {ai:0,climate:0,local:0,war:0,disinfo:0,funding:0,safety:0,diversity:0,press:0};
    sess.forEach(s => {
      const t = s.toLowerCase();
      aiKeywords.forEach(k => { if(t.includes(k)) cats.ai++; });
      climateKeywords.forEach(k => { if(t.includes(k)) cats.climate++; });
      localKeywords.forEach(k => { if(t.includes(k)) cats.local++; });
      warKeywords.forEach(k => { if(t.includes(k)) cats.war++; });
      disinfoKeywords.forEach(k => { if(t.includes(k)) cats.disinfo++; });
      fundingKeywords.forEach(k => { if(t.includes(k)) cats.funding++; });
      safetyKeywords.forEach(k => { if(t.includes(k)) cats.safety++; });
      diversityKeywords.forEach(k => { if(t.includes(k)) cats.diversity++; });
      pressKeywords.forEach(k => { if(t.includes(k)) cats.press++; });
    });
    Object.entries(cats).forEach(([k,v]) => {
      if (!m[k]) m[k] = {};
      m[k][yr] = v;
    });
  });
  return m;
}

function totalUnique() {
  return Object.keys(ALL_SPEAKERS).length;
}

// ─── BAR CHART ────────────────────────────────────────────────────────────

function barChart(data, colorVar, label) {
  const max = Math.max(...data.map(d=>d.count), 1);
  const colors = ['#c8411f','#c8411f','#c8411f','#2d5a8e','#2d5a8e','#5a8c3c','#5a8c3c'];
  return `<div class="ijf-bar-chart">
    ${data.map((d,i) => `
      <div class="ijf-bar-row">
        <div class="ijf-bar-label">${d.year||d.name}</div>
        <div class="ijf-bar-track">
          <div class="ijf-bar-fill" style="width:${(d.count/max*100).toFixed(1)}%;background:${colors[i%colors.length]||'#c8411f'}"></div>
        </div>
        <div class="ijf-bar-value">${d.count}</div>
      </div>
    `).join('')}
  </div>`;
}

          `).join('')}
        </tbody>
      </table></div>
      ` : '<div class="ijf-empty">No speakers found in 5+ editions</div>'}
    </div>

    <div class="ijf-card">
      <div class="ijf-card-title">Top Organisations <span>by speaker appearances across all years</span></div>
      ${barChart(topOrgs('all').slice(0,15),'accent3','')}
    </div>
  `;
}

// ─── SPEAKERS TAB ─────────────────────────────────────────────────────────

function renderSpeakers() {
  let speakers = Object.values(ALL_SPEAKERS);

  if (speakerYear !== 'all') {
    speakers = speakers.filter(s => s.years.includes(speakerYear));
  }
  if (speakerSearch) {
    const q = speakerSearch.toLowerCase();
    speakers = speakers.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.orgs.some(o=>o.toLowerCase().includes(q)) ||
      s.roles.some(r=>r.toLowerCase().includes(q))
    );
  }
  if (speakerSort === 'years') speakers.sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name));
  else if (speakerSort === 'name') speakers.sort((a,b)=>a.name.localeCompare(b.name));
  else if (speakerSort === 'org') speakers.sort((a,b)=>(a.orgs[0]||'').localeCompare(b.orgs[0]||''));

  return `
    <div class="ijf-search-row">
      <input class="ijf-input" placeholder="Search name, organisation or role…" value="${speakerSearch}" oninput="speakerSearch=this.value;renderContent()" />
      <select class="ijf-input" onchange="speakerSort=this.value;renderContent()">
        <option value="years" ${speakerSort==='years'?'selected':''}>Sort: Most editions</option>
        <option value="name" ${speakerSort==='name'?'selected':''}>Sort: Name A–Z</option>
        <option value="org" ${speakerSort==='org'?'selected':''}>Sort: Organisation</option>
      </select>
      <select class="ijf-input" onchange="speakerYear=this.value;renderContent()">
        <option value="all" ${speakerYear==='all'?'selected':''}>All years</option>
        ${YEARS.map(y=>`<option value="${y}" ${speakerYear===y?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>
    <div class="ijf-card">
      <div class="ijf-card-title">${speakers.length} speakers ${speakerYear!=='all'?`in ${speakerYear}`:''}</div>
      ${speakers.length ? `
      <div class="ijf-scroll"><table class="ijf-table">
        <thead><tr><th>#</th><th onclick="speakerSort='name';renderContent()">Name ↕</th><th onclick="speakerSort='years';renderContent()">Editions ↕</th><th>Years</th><th onclick="speakerSort='org';renderContent()">Organisation ↕</th><th>Role</th></tr></thead>
        <tbody>
          ${speakers.slice(0,200).map((s,i)=>`
            <tr>
              <td style="color:var(--muted)">${i+1}</td>
              <td><strong>${s.name}</strong>${s.count>1?`<span class="returning-dot" title="Returning speaker"></span>`:''}</td>
              <td><span class="ijf-badge ${s.count>=4?'':'ijf-badge-blue'}">${s.count}</span></td>
              <td>${s.years.map(y=>`<span class="ijf-tag">${y}</span>`).join('')}</td>
              <td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.orgs[0]||'—'}</td>
              <td style="color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.roles[0]||'—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table></div>
      ${speakers.length>200?`<p style="color:var(--muted);font-size:11px;margin-top:12px">Showing 200 of ${speakers.length}. Use search to filter.</p>`:''}
      ` : '<div class="ijf-empty">No speakers match your search.</div>'}
    </div>
  `;
}

// ─── SESSIONS TAB ────────────────────────────────────────────────────────

function renderSessions() {
  let sessions = [];
  YEARS.forEach(yr => {
    (IJF_DATA.sessions[yr]||[]).forEach(s => {
      sessions.push({title:s, year:yr});
    });
  });

  if (sessionYear !== 'all') sessions = sessions.filter(s=>s.year===sessionYear);
  if (sessionSearch) {
    const q = sessionSearch.toLowerCase();
    sessions = sessions.filter(s=>s.title.toLowerCase().includes(q));
  }

  return `
    <div class="ijf-search-row">
      <input class="ijf-input" placeholder="Search sessions…" value="${sessionSearch}" oninput="sessionSearch=this.value;renderContent()" />
      <select class="ijf-input" onchange="sessionYear=this.value;renderContent()">
        <option value="all" ${sessionYear==='all'?'selected':''}>All years</option>
        ${YEARS.map(y=>`<option value="${y}" ${sessionYear===y?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>
    <div class="ijf-card">
      <div class="ijf-card-title">${sessions.length} sessions ${sessionYear!=='all'?`in ${sessionYear}`:''}</div>
      ${sessions.length ? `
      <div class="ijf-scroll"><table class="ijf-table">
        <thead><tr><th>Session Title</th><th>Year</th></tr></thead>
        <tbody>
          ${sessions.slice(0,300).map(s=>`
            <tr>
              <td>${s.title}</td>
              <td><span class="ijf-tag">${s.year}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table></div>
      ${sessions.length>300?`<p style="color:var(--muted);font-size:11px;margin-top:12px">Showing 300 of ${sessions.length}. Use search to filter.</p>`:''}
      ` : '<div class="ijf-empty">No sessions match your search.</div>'}
    </div>
  `;
}

// ─── THEMES TAB ──────────────────────────────────────────────────────────

function renderThemes() {
  const themeData = getThemes();
  const themeLabels = {
    ai: 'Artificial Intelligence',
    climate: 'Climate & Environment',
    war: 'War & Conflict Reporting',
    disinfo: 'Mis/Disinformation',
    funding: 'Funding & Business Models',
    diversity: 'Diversity, Gender & Race',
    press: 'Press Freedom & Media Attacks',
    safety: 'Journalist Safety & Well-being',
    local: 'Local Journalism'
  };
  const max = Math.max(...Object.values(themeData).flatMap(d=>Object.values(d)), 1);

  return `
    <div class="ijf-card">
      <div class="ijf-card-title">Topic Trends Across Editions <span>based on session title analysis</span></div>
      <div style="overflow-x:auto">
        <table class="ijf-table">
          <thead>
            <tr>
              <th>Theme</th>
              ${YEARS.map(y=>`<th>${y}</th>`).join('')}
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(themeData).map(([key,vals])=>{
              const total = Object.values(vals).reduce((a,b)=>a+b,0);
              return `<tr>
                <td><strong>${themeLabels[key]||key}</strong></td>
                ${YEARS.map(y=>{
                  const v = vals[y]||0;
                  const pct = (v/max*100).toFixed(0);
                  const bg = v===0?'transparent': v<3?'#f0e0da': v<6?'#e8c4b8': '#c8411f';
                  const color = v>=6?'white':'inherit';
                  return `<td style="text-align:center;background:${bg};color:${color}">${v||''}</td>`;
                }).join('')}
                <td><strong>${total}</strong></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <p style="color:var(--muted);font-size:11px;margin-top:12px">Numbers indicate session count per year mentioning keywords for each theme. Darker red = more sessions.</p>
    </div>

    <div class="ijf-card">
      <div class="ijf-card-title">AI on the Agenda <span>sessions mentioning AI across editions</span></div>
      ${barChart(YEARS.map(yr=>({year:yr, count: (IJF_DATA.sessions[yr]||[]).filter(s=>s.toLowerCase().includes('ai')||s.toLowerCase().includes('artificial intelligence')||s.toLowerCase().includes('algorithm')||s.toLowerCase().includes('machine learning')||s.toLowerCase().includes('generative')).length})),'accent','')}
    </div>

    <div class="ijf-card">
      <div class="ijf-card-title">Climate & Environment Sessions <span>sessions mentioning climate, environment, green, fossil, carbon</span></div>
      ${barChart(YEARS.map(yr=>({year:yr, count: (IJF_DATA.sessions[yr]||[]).filter(s=>s.toLowerCase().includes('climate')||s.toLowerCase().includes('environment')||s.toLowerCase().includes('fossil')||s.toLowerCase().includes('carbon')||s.toLowerCase().includes('cop ')).length})),'accent3','')}
    </div>
  `;
}

// ─── RETURNING SPEAKERS TAB ───────────────────────────────────────────────

function renderReturning() {
  const returning = Object.values(ALL_SPEAKERS)
    .filter(s=>s.count>1)
    .sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name));

  const byCount = {};
  returning.forEach(s => {
    byCount[s.count] = (byCount[s.count]||0)+1;
  });

  return `
    <div class="ijf-grid-3">
      ${[2,3,4,5,6,7].map(n => `
        <div class="ijf-card">
          <div class="ijf-card-title" style="font-size:14px">${n} editions</div>
          <div style="font-family:'Playfair Display',serif;font-size:32px;color:var(--accent);font-weight:700">${byCount[n]||0}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">speakers</div>
        </div>
      `).join('')}
    </div>

    <div class="ijf-card">
      <div class="ijf-card-title">${returning.length} speakers appeared in 2+ editions</div>
      <div class="ijf-scroll"><table class="ijf-table">
        <thead><tr><th>#</th><th>Speaker</th><th>Editions</th><th>Years Active</th><th>Organisation</th></tr></thead>
        <tbody>
          ${returning.slice(0,150).map((s,i)=>`
            <tr>
              <td style="color:var(--muted)">${i+1}</td>
              <td><strong>${s.name}</strong></td>
              <td><span class="ijf-badge ${s.count>=5?'':'ijf-badge-blue'}">${s.count}</span></td>
              <td>${s.years.map(y=>`<span class="ijf-tag">${y}</span>`).join('')}</td>
              <td style="color:var(--muted)">${s.orgs[0]||'—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table></div>
    </div>
  `;
}

// ─── ORGS TAB ─────────────────────────────────────────────────────────────

function renderOrgs() {
  const orgs = topOrgs(orgYear);
  return `
    <div class="ijf-year-pills">
      ${['all',...YEARS].map(y=>`
        <button class="ijf-year-pill ${orgYear===y?'active':''}" onclick="orgYear='${y}';renderContent()">${y==='all'?'All years':y}</button>
      `).join('')}
    </div>
    <div class="ijf-card">
      <div class="ijf-card-title">Top 20 Organisations by Speaker Appearances <span>${orgYear==='all'?'all years':orgYear}</span></div>
      ${barChart(orgs,'accent','')}
    </div>
  `;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────

function renderContent() {
  renderTabs();
  const el = document.getElementById('content');
  switch(currentTab) {
    case 'overview':   el.innerHTML = renderOverview(); break;
    case 'speakers':   el.innerHTML = renderSpeakers(); break;
    case 'sessions':   el.innerHTML = renderSessions(); break;
    case 'themes':     el.innerHTML = renderThemes(); break;
    case 'returning':  el.innerHTML = renderReturning(); break;
    case 'orgs':       el.innerHTML = renderOrgs(); break;
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────

document.querySelectorAll('.ijf-tab').forEach(t => {
  t.addEventListener('click', () => {
    currentTab = t.dataset.tab;
    renderContent();
  });
});

renderHeaderStats();
renderContent();
</script>
</body>
</html>
